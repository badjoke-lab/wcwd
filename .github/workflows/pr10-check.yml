name: PR10 Check
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: python3 scripts/check_token_heatmap.py
      - run: node --check src/token-heatmap-safe.js
      - run: node --check world-chain/token-heatmap/token-heatmap.js
      - run: node --experimental-default-type=module scripts/test_token_heatmap_safe.mjs
