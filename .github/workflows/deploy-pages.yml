name: Deploy WCWD Pages

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Existing Cloudflare Pages project name"
        required: true
        type: string
      production_branch:
        description: "Cloudflare Pages production branch"
        required: true
        default: "main"
        type: string
      production_url:
        description: "Public URL to verify after deployment"
        required: true
        default: "https://wcwd.badjoke-lab.com"
        type: string

permissions:
  contents: read

jobs:
  deploy-pages:
    name: Build, deploy, and verify WCWD Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout selected commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce no-background-automation guard
        run: python3 scripts/check_no_cloudflare_automation.py

      - name: Regenerate committed public HTML and sitemap
        run: |
          python3 scripts/build_pages.py
          python3 scripts/gen_sitemap.py
          git diff --exit-code

      - name: Build canonical Pages artifact
        run: |
          python3 scripts/build_pages_dist.py --commit "${GITHUB_SHA}"
          python3 scripts/check_pages_artifact.py dist --expected-commit "${GITHUB_SHA}"

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is not set" >&2; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is not set" >&2; exit 1; }
          test -n "${{ inputs.project_name }}" || { echo "project_name is required" >&2; exit 1; }

      - name: Deploy existing Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ inputs.project_name }}
          PRODUCTION_BRANCH: ${{ inputs.production_branch }}
        run: |
          npx --yes wrangler@latest pages deploy dist \
            --project-name="${PROJECT_NAME}" \
            --branch="${PRODUCTION_BRANCH}" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" \
            --commit-dirty=true \
            --experimental-auto-create=false \
            --experimental-provision=false

      - name: Verify public production source
        run: |
          python3 scripts/check_production_source.py \
            --base-url "${{ inputs.production_url }}" \
            --expected-commit "${GITHUB_SHA}"
