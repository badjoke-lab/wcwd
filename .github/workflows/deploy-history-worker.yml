name: Deploy History Worker

on:
  workflow_dispatch:
    inputs:
      run_api_check:
        description: "Run Token Heatmap API check after deploy"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      base_url:
        description: "Worker base URL for post-deploy API check"
        required: true
        default: "https://wcwd-history.badjoke-lab.workers.dev"

permissions:
  contents: read

jobs:
  deploy-history-worker:
    name: Deploy wcwd-history worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce no-background-automation guard
        run: python3 scripts/check_no_cloudflare_automation.py

      - name: Enforce read-only and fixed-fetch policies
        run: |
          python3 scripts/check_no_public_write_routes.py
          python3 scripts/check_external_fetch_policy.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Worker syntax and route behavior
        run: |
          node --check src/entrypoint.js
          node --check src/index.js
          node --check src/worker.js
          node --check src/oracles-feed.js
          node --check src/paymaster-preflight.js
          node --experimental-default-type=module scripts/test_read_only_worker.mjs
          node --experimental-default-type=module scripts/test_external_fetch_policy.mjs

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN secret is not set" >&2
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID secret is not set" >&2
            exit 1
          fi
          npx --yes wrangler@latest deploy

      - name: Set up Python
        if: ${{ inputs.run_api_check == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Token Heatmap API gate check
        if: ${{ inputs.run_api_check == 'true' }}
        run: |
          python3 scripts/check_token_heatmap_api.py \
            --base-url "${{ inputs.base_url }}" \
            --timeout "20"
