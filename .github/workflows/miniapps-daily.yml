name: miniapps-daily

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  build-miniapps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build daily miniapps data
        run: node test/mini-apps/scripts/build_daily.js

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/mini-apps/data
          git commit -m "chore(miniapps): update daily data"
          git push
