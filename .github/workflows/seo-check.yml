name: SEO Check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Enforce no-background-automation guard
        run: python3 scripts/check_no_cloudflare_automation.py

      - name: Run static SEO checks
        run: python3 scripts/check_seo.py
