name: SEO Check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enforce no-background-automation guard
        run: python3 scripts/check_no_cloudflare_automation.py

      - name: Enforce read-only public routes
        run: |
          python3 scripts/check_no_public_write_routes.py
          node --check src/entrypoint.js
          node --check src/index.js
          node --check src/worker.js
          node --experimental-default-type=module scripts/test_read_only_worker.mjs

      - name: Run static SEO checks
        run: python3 scripts/check_seo.py

      - name: Build canonical Pages artifact
        run: python3 scripts/build_pages_dist.py --commit "${GITHUB_SHA}"

      - name: Validate canonical Pages artifact
        run: python3 scripts/check_pages_artifact.py dist --expected-commit "${GITHUB_SHA}"
