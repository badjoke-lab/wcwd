name: SEO Check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enforce no-background-automation guard
        run: python3 scripts/check_no_cloudflare_automation.py

      - name: Enforce read-only public routes
        run: |
          python3 scripts/check_no_public_write_routes.py
          node --check src/entrypoint.js
          node --check src/index.js
          node --check src/worker.js
          node --experimental-default-type=module scripts/test_read_only_worker.mjs

      - name: Enforce external fetch policy
        run: |
          python3 scripts/check_external_fetch_policy.py
          node --check src/oracles-feed.js
          node --check src/paymaster-preflight.js
          node --check 'functions/api/[[path]].js'
          node --experimental-default-type=module scripts/test_external_fetch_policy.mjs

      - name: Enforce Monitor metric semantics
        run: |
          python3 scripts/check_monitor_semantics.py
          node --check src/monitor-semantics.js
          node --check src/monitor-daily.js
          node --check src/monitor-summary.js
          node --check world-chain/monitor/monitor-notes.js
          node --experimental-default-type=module scripts/test_monitor_semantics.mjs

      - name: Enforce cache and request policy
        run: |
          node --check src/cache-policy.js
          node --check assets/runtime-request-policy.js
          node --check 'functions/api/[[path]].js'
          node --experimental-default-type=module scripts/test_cache_request_policy.mjs

      - name: Validate registered page targets
        run: python3 scripts/build_pages_registry.py

      - name: Regenerate sitemap and robots
        run: python3 scripts/gen_sitemap.py

      - name: Reject generated-file drift
        run: git diff --exit-code

      - name: Validate routes and static SEO
        run: |
          python3 scripts/check_routes.py
          python3 scripts/check_seo.py

      - name: Build canonical Pages artifact
        run: python3 scripts/build_pages_dist.py --commit "${GITHUB_SHA}"

      - name: Validate canonical Pages artifact
        run: python3 scripts/check_pages_artifact.py dist --expected-commit "${GITHUB_SHA}"
