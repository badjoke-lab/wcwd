<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WCWD — All Mini Apps (Test)</title>
  <meta name="description" content="All Mini Apps test listing with search, sort, filters, paging, and compare mode." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/common.css" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .page-head { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; }
    .updated { font-size:13px; color:#666; margin-top:22px; }
    .toolbar { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px; }
    .toolbar .field { display:flex; flex-direction:column; gap:4px; }
    .toolbar label { font-size:12px; color:#555; }
    .toolbar input, .toolbar select { width:100%; }
    .flags { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .badge { border:1px solid #ddd; border-radius:999px; padding:2px 8px; font-size:11px; font-weight:700; display:inline-block; }
    .badge.hot { border-color:#ffd1a8; background:#fff6ed; }
    .badge.new { border-color:#bfe9c7; background:#effcf2; }
    .badge.drop { border-color:#ffc4c4; background:#fff1f1; }
    .delta-up { color:#0c6; font-weight:700; }
    .delta-down { color:#c33; font-weight:700; }
    .delta-flat { color:#666; }
    .table-wrap table th, .table-wrap table td { border-bottom:1px solid #eee; padding:8px 6px; font-size:13px; text-align:left; vertical-align:top; }
    .actions-disabled { color:#888; font-size:12px; }
    .pagination { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:12px; }
    .compare-bar { position:fixed; left:0; right:0; bottom:0; background:#111; color:#fff; padding:10px 12px; z-index:40; box-shadow:0 -2px 12px rgba(0,0,0,.2); }
    .compare-inner { max-width:1100px; margin:0 auto; display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .compare-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .compare-panel { margin-top:14px; }
    .compare-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:10px; }
    .compare-item { border:1px solid #e7e7e7; border-radius:10px; padding:10px; background:#fff; }
    .toast { color:#c33; font-size:12px; margin-top:8px; min-height:1.2em; }
    @media (max-width:720px) {
      .updated { margin-top:0; }
      .table-wrap { overflow:auto; }
      .compare-bar { padding:8px 10px; }
    }
  </style>
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <a class="brand" href="/">WCWD</a>
    <nav class="nav" data-site-nav>
      <a href="/">Home</a>
      <a href="/world-chain/">World Chain</a>
      <a href="/world-id/">World ID</a>
      <a href="/test/" aria-current="page">Test</a>
      <a href="/about/">About</a>
      <a href="/donate/">Donate</a>
    </nav>
  </div>
</header>

<main class="container" style="padding-bottom:80px;">
  <div class="page-head">
    <div>
      <p><a href="/test/mini-apps/">← Back to Radar</a></p>
      <h1>All Mini Apps (Test)</h1>
    </div>
    <p class="updated" id="updatedAt">Updated: Unknown</p>
  </div>

  <section id="stateMount"></section>

  <section class="card">
    <h2>Search / Sort / Filter</h2>
    <div class="toolbar">
      <div class="field">
        <label for="searchInput">Search name</label>
        <input id="searchInput" type="search" placeholder="Search mini app name" />
      </div>
      <div class="field">
        <label for="sortKey">Sort key</label>
        <select id="sortKey"></select>
      </div>
      <div class="field">
        <label for="sortDir">Sort order</label>
        <select id="sortDir">
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
      </div>
      <div class="field">
        <label for="categoryFilter">Category</label>
        <select id="categoryFilter"></select>
      </div>
    </div>
    <div class="flags" style="margin-top:10px;">
      <label><input type="checkbox" id="hotOnly" /> HOT only</label>
      <label><input type="checkbox" id="newOnly" /> NEW only</label>
      <label><input type="checkbox" id="dropOnly" /> DROP only</label>
      <button class="btn secondary" id="resetFilters" type="button">Reset</button>
    </div>
    <p class="toast" id="selectToast" aria-live="polite"></p>
  </section>

  <section class="card">
    <h2>All apps</h2>
    <p class="small muted" id="resultMeta"></p>
    <div class="table-wrap">
      <table aria-label="All mini apps table">
        <thead>
          <tr>
            <th>Select</th>
            <th>rank7d</th>
            <th>name</th>
            <th>value7d</th>
            <th>deltaRank7d</th>
            <th>badges</th>
            <th>category</th>
            <th>actions</th>
          </tr>
        </thead>
        <tbody id="appsBody"></tbody>
      </table>
    </div>

    <div class="pagination">
      <button class="btn secondary" type="button" id="prevPage">Prev</button>
      <span id="pageInfo">Page 1</span>
      <button class="btn secondary" type="button" id="nextPage">Next</button>
      <button class="btn secondary" type="button" id="backTop">Back to top</button>
    </div>

    <div class="compare-panel" id="comparePanel" hidden>
      <h3>Compare panel</h3>
      <div class="compare-grid" id="compareGrid"></div>
    </div>
  </section>
</main>

<div class="compare-bar" id="compareBar" hidden>
  <div class="compare-inner">
    <strong id="selectedCount">Selected: 0/5</strong>
    <div class="compare-actions">
      <button class="btn secondary" type="button" id="clearSelected">Clear</button>
      <button class="btn" type="button" id="openCompare">Compare</button>
    </div>
  </div>
</div>
<script src="/assets/common.js"></script>
<script src="/test/mini-apps/all/app.js"></script>
</body>
</html>
